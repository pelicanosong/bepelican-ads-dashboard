<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BePelican — Meta Ads Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.0/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1c1e21; }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1877f2, #0a5fd8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 380px;
            width: 100%;
        }

        .login-box h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .login-box .subtitle { font-size: 13px; color: #65676b; text-align: center; margin-bottom: 32px; }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #1877f2;
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .login-box button:hover { background: #0a5fd8; }
        .login-box .error { color: #e41c1c; font-size: 13px; margin-top: 12px; }
        .login-screen.hidden { display: none; }

        header {
            background: linear-gradient(135deg, #1877f2, #0a5fd8);
            color: white;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header .logo { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        header .logo span { background: white; color: #1877f2; border-radius: 8px; padding: 4px 10px; font-size: 14px; font-weight: 800; }
        header .controls { display: flex; align-items: center; gap: 16px; }
        header .meta { font-size: 13px; opacity: 0.85; }

        .refresh-btn, .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
        }

        .refresh-btn:hover, .logout-btn:hover { background: rgba(255,255,255,0.3); }

        .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

        .summary-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-align: center;
        }

        .summary-card .label { font-size: 12px; color: #65676b; text-transform: uppercase; margin-bottom: 6px; }
        .summary-card .value { font-size: 26px; font-weight: 700; }
        .summary-card .sub { font-size: 12px; color: #65676b; margin-top: 3px; }
        .summary-card.good .value { color: #42b72a; }
        .summary-card.blue .value { color: #1877f2; }

        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #42b72a; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(66,183,42,0.2)} 50%{box-shadow:0 0 0 6px rgba(66,183,42,0.1)} }

        .campaigns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
        .campaign-card { background: white; border-radius: 14px; padding: 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-top: 4px solid #1877f2; }
        .paused-card { border-top-color: #ccc; opacity: 0.75; }

        .campaign-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .campaign-name { font-size: 15px; font-weight: 700; max-width: 200px; }
        .acct-label { font-size: 11px; color: #65676b; margin-bottom: 14px; }

        .badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .badge.active { background: #e6f7e1; color: #42b72a; }
        .badge.paused { background: #f0f2f5; color: #65676b; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .metric { text-align: center; padding: 10px 6px; background: #f7f8fa; border-radius: 10px; }
        .m-val { font-size: 19px; font-weight: 700; }
        .m-val.good { color: #42b72a; }
        .m-val.warn { color: #f0a500; }
        .m-label { font-size: 11px; color: #65676b; margin-top: 2px; }

        .divider { height: 1px; background: #e4e6eb; margin: 12px 0; }

        .engagement-bar { display: flex; gap: 8px; }
        .eng-item { flex: 1; text-align: center; padding: 10px 6px; background: #f0f2f5; border-radius: 10px; }
        .e-val { font-size: 16px; font-weight: 700; color: #1877f2; }
        .e-label { font-size: 10px; color: #65676b; margin-top: 2px; }

        .alerts { margin-bottom: 28px; }
        .alert { display: flex; align-items: flex-start; gap: 14px; padding: 14px 18px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; }
        .alert.red { background: #ffeaea; border-left: 4px solid #e41c1c; }
        .alert.orange { background: #fff4e0; border-left: 4px solid #f0a500; }
        .alert.green { background: #e6f7e1; border-left: 4px solid #42b72a; }
        .alert .icon { font-size: 18px; }
        .alert .text strong { display: block; font-weight: 700; margin-bottom: 2px; }

        .loading { text-align: center; padding: 40px; color: #65676b; }
        .loading .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #e4e6eb; border-top-color: #1877f2; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { text-align: center; color: #65676b; font-size: 12px; padding: 20px; border-top: 1px solid #e4e6eb; }

        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🦤 BePelican</h1>
        <p class="subtitle">Meta Ads Dashboard</p>
        <input type="password" id="passwordInput" placeholder="Contraseña" onkeypress="if(event.key==='Enter') login()" />
        <button onclick="login()">Entrar</button>
        <div class="error" id="error"></div>
    </div>
</div>

<div id="dashboard">
    <header>
        <div class="logo">🦤 BePelican <span>META ADS</span></div>
        <div class="controls">
            <div class="meta">
                <strong id="lastUpdate">Cargando...</strong>
            </div>
            <button class="refresh-btn" onclick="refreshData()">🔄 Actualizar</button>
            <button class="logout-btn" onclick="logout()">Salir</button>
        </div>
    </header>

    <div class="container">
        <div id="content" class="loading">
            <div class="spinner"></div>
            <p>Cargando datos...</p>
        </div>
    </div>

    <footer>BePelican Meta Ads Dashboard · Datos en vivo · Meta Marketing API v19.0</footer>
</div>

<script>
    // ═══════════════════════════════════════════════════════════════════════════════
    // CONFIGURACIÓN DE SEGURIDAD (editar solo estas 2 variables)
    // ═══════════════════════════════════════════════════════════════════════════════

    // Hash de la contraseña (hasheada con SHA-256)
    // Genera el hash con: echo -n "TU-CONTRASEÑA" | sha256sum
    // Por defecto: "BePelican2026"
    const PASSWORD_HASH = "8f4e3c8d7c1e9a5b6d2f4a8c3e1b9d5f7a2c4e6b8d1f3a5c7e9b1d3f5a7c9e";

    // Token de Meta Ads (cifrado)
    // Se genera con encrypt_token.py
    const ENCRYPTED_TOKEN = "U2FsdGVkX1+7qX2p5k9mL8xW2c3jN4fK9vP2qH7wR5sT8yZ3aB1dE4gH6jL0mN8pQ1sT3uV5wX7yZ9aB1cD3eF5gH7iJ9kL1mN3oP5qR7sT9uV1wX3yZ5aB7cD9eF1gH3iJ5kL7mN9oP1qR3sT5uV7wX9yZ1aB3cD5eF7gH9iJ1kL3mN5oP7qR9sT1uV3wX5yZ7aB9cD1eF3gH1iJ3kL5mN7oP9qR1sT3uV5wX7yZ9aB1cD3eF5gH7iJ9kL1mN3oP5qR7sT9uV1wX3yZ5aB7cD9eF1gH3iJ5kL7mN9oP1qR3sT5uV7wX9yZ1aB3cD5eF7gH9iJ1kL3mN5oP7qR9sT1uV3wX5yZ7aB9cD1eF3gH1iJ3kL5mN7oP9qR1sT3uV5wX7yZ9aB1cD3eF5gH7iJ9kL1mN3oP5qR7sT9uV1wX3yZ5aB7cD9eF1gH3iJ5kL7mN9oP1qR3sT5uV7wX9yZ";

    function hashPassword(pwd) {
        return CryptoJS.SHA256(pwd).toString();
    }

    function login() {
        const pwd = document.getElementById("passwordInput").value;
        if (hashPassword(pwd) === PASSWORD_HASH) {
            sessionStorage.setItem("authenticated", "true");
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("dashboard").style.display = "block";
            loadData();
        } else {
            document.getElementById("error").textContent = "Contraseña incorrecta";
        }
    }

    function logout() {
        sessionStorage.removeItem("authenticated");
        location.reload();
    }

    async function loadData() {
        try {
            const response = await fetch("data.json?t=" + new Date().getTime());
            const data = await response.json();
            renderDashboard(data);
            document.getElementById("lastUpdate").textContent = `Actualizado: ${new Date(data.timestamp).toLocaleString("es-CO")}`;
        } catch (e) {
            document.getElementById("content").innerHTML = `<p style="color: #e41c1c;">Error al cargar datos</p>`;
        }
    }

    function renderDashboard(data) {
        const { campaigns, totals } = data;
        const active = campaigns.filter(c => c.status === "ACTIVE");

        let html = `
            <div class="summary-bar">
                <div class="summary-card blue">
                    <div class="label">Gasto Total</div>
                    <div class="value">$${Math.round(totals.spend).toLocaleString()}</div>
                    <div class="sub">COP</div>
                </div>
                <div class="summary-card">
                    <div class="label">Alcance</div>
                    <div class="value">${totals.reach.toLocaleString()}</div>
                    <div class="sub">personas</div>
                </div>
                <div class="summary-card good">
                    <div class="label">CTR Promedio</div>
                    <div class="value">${totals.ctr_avg.toFixed(2)}%</div>
                    <div class="sub">benchmark: 1.0%</div>
                </div>
                <div class="summary-card good">
                    <div class="label">Mensajes</div>
                    <div class="value">${totals.msgs.toLocaleString()}</div>
                    <div class="sub">conexiones</div>
                </div>
                <div class="summary-card">
                    <div class="label">Campañas</div>
                    <div class="value">${active.length}</div>
                    <div class="sub">activas</div>
                </div>
            </div>

            <div class="section-title"><div class="dot"></div> Campañas Activas</div>
            <div class="campaigns">
                ${active.map(c => renderCard(c)).join("")}
            </div>
        `;

        document.getElementById("content").innerHTML = html;
    }

    function renderCard(c) {
        if (c.impressions === 0) {
            return `<div class="campaign-card paused-card">
                <div class="campaign-header">
                    <div class="campaign-name">${c.name}</div>
                </div>
                <p style="color: #65676b; font-size: 13px;">Sin datos</p>
            </div>`;
        }

        const ctrClass = c.ctr >= 1.0 ? "good" : "warn";
        return `
            <div class="campaign-card">
                <div class="campaign-header">
                    <div class="campaign-name">${c.name}</div>
                    <span class="badge active">● ACTIVA</span>
                </div>
                <div class="acct-label">${c.account}</div>
                <div class="metrics-grid">
                    <div class="metric"><div class="m-val ${ctrClass}">${c.ctr.toFixed(2)}%</div><div class="m-label">CTR</div></div>
                    <div class="metric"><div class="m-val">$${Math.round(c.spend).toLocaleString()}</div><div class="m-label">Gasto</div></div>
                    <div class="metric"><div class="m-val">${c.reach.toLocaleString()}</div><div class="m-label">Alcance</div></div>
                </div>
                <div class="divider"></div>
                <div class="engagement-bar">
                    <div class="eng-item"><div class="e-val">${c.msgs.toLocaleString()}</div><div class="e-label">💬 Msgs</div></div>
                    <div class="eng-item"><div class="e-val">${c.link_clicks.toLocaleString()}</div><div class="e-label">🔗 Clicks</div></div>
                </div>
            </div>`;
    }

    function refreshData() {
        loadData();
    }

    // Verificar autenticación al cargar
    if (sessionStorage.getItem("authenticated") !== "true") {
        document.getElementById("loginScreen").classList.remove("hidden");
    } else {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("dashboard").style.display = "block";
        loadData();
    }
</script>

</body>
</html>
