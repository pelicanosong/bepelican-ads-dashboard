name: Update Meta Ads Data

on:
  schedule:
    - cron: '0 9 * * *'    # Corre todos los días a las 9 AM UTC
  workflow_dispatch:         # Permite correrlo manualmente desde GitHub Actions

permissions:
  contents: write            # Necesario para que pueda hacer git push

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script (all periods)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python3 update_data.py

      - name: Commit and push data
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data.json data_today.json data_week.json data_month.json data_last_month.json data_3months.json
          git diff --staged --quiet || git commit -m "Update Meta Ads data — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
